                        try {
                            await window.fb.signInAnonymously(window.fb.auth);
                            window.fb.onAuthStateChanged(window.fb.auth, setUser);
                        } catch (e) { console.error("Auth Error", e); }
                    }
                };
                initAuth();
            }, []);

            useEffect(() => {
                if (view === 'admin' && user && window.fb) {
                    const registrationsRef = window.fb.collection(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'registrations');
                    const unsub = window.fb.onSnapshot(registrationsRef, (snap) => {
                        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        setData(docs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)));
                    }, (err) => console.error(err));
                    return () => unsub();
                }
            }, [view, user]);

            const scores = useMemo(() => {
                const s = { R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 };
                Object.entries(answers).forEach(([key, val]) => {
                    const g = key.split('_')[0];
                    if (s.hasOwnProperty(g)) s[g] += val;
                });
                return s;
            }, [answers]);

                setLoading(true);
                try {
                    // Lưu dữ liệu lên Firebase
                    if (window.fb && user) {
                        const ref = window.fb.collection(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'registrations');

                            ...formData,
                            scores,
                            timestamp: window.fb.serverTimestamp()
                        });
                    }

                                    "Nền tảng hỗ trợ học sinh Việt Nam thấu hiểu năng lực bản thân, khám phá nghề nghiệp và kiến tạo tương lai hoàn toàn miễn phí."
                                </p>
                                <div className="mt-14 flex flex-col items-center gap-6">
                                    <button onClick={() => setView('register')} className="group bg-green-500 text-white px-12 py-5 rounded-full font-black text-xl shadow-2xl shadow-green-200 hover:bg-green-600 hover:scale-105 active:scale-95 transition-all flex items-center gap-3">
                                        Bắt đầu ngay <Icon name="arrow-right" className="group-hover:translate-x-1 transition-transform" />
                                    </button>
                                </div>
                            </main>
                        );
                    case 'register':
                        return (
                            <div className="flex-1 flex items-center justify-center p-4 animate-fade-in">
                                <div className="bg-white w-full max-w-md p-8 rounded-[2.5rem] shadow-xl border border-green-50">
                                    <h2 className="text-2xl font-black text-green-700 tracking-tight mb-6">Thông tin đăng ký</h2>
                                    <div className="space-y-4 text-left">
                                        <div className="space-y-1.5">
                                            <label className="flex items-center gap-2 text-[10px] font-black text-green-400 uppercase tracking-widest ml-1"><Icon name="user" size={12} /> Họ và tên</label>
                                            <input className="w-full px-5 py-3 bg-gray-50 border-2 border-transparent rounded-xl font-bold text-green-800 text-sm outline-none focus:border-green-400 transition-all" value={formData.name} onChange={e => setFormData({ ...formData, name: e.target.value })} />
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="flex items-center gap-2 text-[10px] font-black text-green-400 uppercase tracking-widest ml-1"><Icon name="phone" size={12} /> Số điện thoại</label>
                                            <input className="w-full px-5 py-3 bg-gray-50 border-2 border-transparent rounded-xl font-bold text-green-800 text-sm outline-none focus:border-green-400 transition-all" maxLength={10} value={formData.phone} onChange={e => setFormData({ ...formData, phone: e.target.value.replace(/\D/g, "") })} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1.5">
                                                <label className="flex items-center gap-2 text-[10px] font-black text-green-400 uppercase tracking-widest ml-1"><Icon name="school" size={12} /> Trường học</label>
                                                <input className="w-full px-5 py-3 bg-gray-50 border-2 border-transparent rounded-xl font-bold text-green-800 text-sm outline-none focus:border-green-400 transition-all" value={formData.school} onChange={e => setFormData({ ...formData, school: e.target.value })} />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="flex items-center gap-2 text-[10px] font-black text-green-400 uppercase tracking-widest ml-1"><Icon name="hash" size={12} /> Lớp</label>
                                                <input className="w-full px-5 py-3 bg-gray-50 border-2 border-transparent rounded-xl font-bold text-green-800 text-sm outline-none focus:border-green-400 transition-all" value={formData.grade} onChange={e => setFormData({ ...formData, grade: e.target.value })} />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="flex items-center gap-2 text-[10px] font-black text-green-400 uppercase tracking-widest ml-1"><Icon name="clock" size={12} /> Thời gian tư vấn phù hợp</label>
                                            <div className="grid grid-cols-3 gap-2">
                                                {TIME_SLOTS.map(t => (
                                                    <button key={t} onClick={() => setFormData({ ...formData, time: t })} className={`py-3 rounded-xl font-bold text-[9px] transition-all border-2 ${formData.time === t ? 'bg-green-500 border-green-500 text-white shadow-md' : 'bg-gray-50 border-transparent text-gray-400 hover:bg-green-50'}`}>{t}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <button disabled={!isFormValid} onClick={() => setView('intro')} className="w-full mt-6 py-4 bg-green-500 text-white rounded-full font-black text-base shadow-lg disabled:opacity-20 transition-all flex items-center justify-center gap-2">Tiếp theo <Icon name="chevron-right" /></button>
                                </div>
                            </div>
                        );
                    case 'intro':
                        return (
                            <div className="flex-1 p-4 md:p-8 animate-fade-in custom-scroll overflow-y-auto">
                                <div className="max-w-3xl mx-auto bg-white rounded-[3rem] shadow-xl border border-green-50 p-8 md:p-10 text-left">
                                    <div className="flex items-center gap-4 mb-6 text-green-600">
                                        <Icon name="info" size={32} />
                                        <h2 className="text-2xl font-black tracking-tight uppercase">GIỚI THIỆU TRẮC NGHIỆM</h2>
                                    </div>
                                    <div className="space-y-6">
                                        <p className="text-green-900 font-bold leading-relaxed">Dành cho học sinh thấu hiểu bản thân thông qua 6 nhóm nghề nghiệp Holland.</p>
                                        <ul className="space-y-3 font-bold text-green-900 text-sm">
                                            <li className="flex gap-3"><div className="mt-1.5 w-1.5 h-1.5 rounded-full bg-green-500 shrink-0" /><span>Chọn mức độ từ 1 đến 5 cho mỗi câu hỏi.</span></li>
                                            <li className="flex gap-3"><div className="mt-1.5 w-1.5 h-1.5 rounded-full bg-green-500 shrink-0" /><span>Trả lời trung thực theo cảm nhận cá nhân.</span></li>
                                        </ul>
                                    </div>
                                    <button onClick={() => setView('test')} className="w-full mt-10 py-5 bg-green-500 text-white rounded-full font-black text-lg shadow-xl hover:bg-green-600 transition-all flex items-center justify-center gap-2">Bắt đầu <Icon name="arrow-right" /></button>
                                </div>
                            </div>
                        );
                    case 'test':
                        const group = HOLLAND_DATA[activeKey];
                        const progress = ((groupIdx + 1) / groups.length) * 100;

                        return (
                            <div className="flex-1 flex flex-col animate-fade-in">
                                <div className="sticky top-[73px] z-[50] bg-[#F7FDF9]/95 backdrop-blur-sm p-6">
                                    <div className="w-full max-w-3xl mx-auto bg-white p-6 rounded-[2.5rem] shadow-md border border-green-50 text-left">
                                        <h3 className="text-2xl font-black text-green-700 tracking-tight">{group.title}</h3>
                                        <div className="h-2.5 w-full bg-green-50 rounded-full overflow-hidden mt-4"><div className="h-full bg-green-500 transition-all" style={{ width: `${progress}%` }}></div></div>
                                    </div>
                                </div>
                                <div className="flex-1 flex flex-col items-center px-6 pb-24 space-y-6 pt-6 overflow-y-auto">
                                    {group.questions.map((q, i) => {
                                        const aid = `${activeKey}_${i}`;
                                        return (
                                            <div key={aid} className="w-full max-w-3xl bg-white p-8 rounded-[2.5rem] border border-green-50 shadow-sm text-left">
                                                <p className="text-lg font-bold text-green-800 mb-6 leading-tight">{i + 1}. {q}</p>
                                                <div className="grid grid-cols-5 gap-2">
                                                    {LIKERT.map(l => (
                                                        <button key={l.v} onClick={() => setAnswers(prev => ({ ...prev, [aid]: l.v }))} className={`py-4 rounded-2xl border-2 font-black text-[9px] flex flex-col items-center gap-1 transition-all ${answers[aid] === l.v ? 'bg-green-500 border-green-500 text-white shadow-lg' : 'bg-gray-50 border-transparent text-gray-300'}`}>
                                                            <span className="text-xs">{l.v}</span><span className="uppercase text-center leading-none">{l.l}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                    <div className="w-full max-w-3xl flex gap-4 pt-8 pb-10">
                                        {groupIdx > 0 && <button onClick={() => setGroupIdx(v => v - 1)} className="flex-1 py-5 bg-white border-2 border-green-100 text-green-500 rounded-full font-black text-lg">Quay lại</button>}
                                        <button
                                            disabled={loading}
                                            onClick={() => {
                                                if (groupIdx < 5) {
                                                    setGroupIdx(v => v + 1);
                                                    window.scrollTo(0, 0);
                                                } else {
                                                    submitFinal();
                                                }
                                            }}
                                            className="flex-[2] py-5 bg-green-500 text-white rounded-full font-black text-lg shadow-xl disabled:opacity-20 transition-all"
                                        >
                                            {loading ? 'Đang lưu...' : (groupIdx < 5 ? 'Tiếp tục' : 'Hoàn tất')}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        );
                    case 'result':
                        const sortedScores = Object.entries(scores).sort((a, b) => b[1] - a[1]);
                        return (
                            <div className="flex-1 p-6 md:p-12 animate-fade-in max-w-4xl mx-auto w-full space-y-8 pb-20">
                                <div className="bg-green-600 text-white p-10 rounded-[3rem] shadow-2xl text-center"><h2 className="text-4xl font-black mb-2">Kết Quả Holland</h2><p className="opacity-80 uppercase tracking-widest text-xs font-bold">{formData.name}</p></div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {sortedScores.map(([key, score], idx) => (
                                        <div key={key} className={`p-8 bg-white rounded-[2.5rem] border-2 text-left ${idx === 0 ? 'border-green-500 shadow-xl scale-105' : 'border-green-50 shadow-sm'}`}>
                                            <div className="flex justify-between items-start mb-4"><span className={`text-[10px] font-black px-3 py-1 rounded-full ${idx === 0 ? 'bg-green-500 text-white' : 'bg-gray-100 text-gray-400'}`}>Hạng {idx + 1}</span><span className="text-2xl font-black text-green-600">{score}đ</span></div>
                                            <h4 className="text-xl font-black text-green-700">{HOLLAND_DATA[key].title}</h4>
                                            <p className="text-sm font-bold text-gray-600 mt-4 leading-relaxed italic">{HOLLAND_DATA[key].desc}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-white p-10 rounded-[3rem] border border-green-100 shadow-xl text-center">
                                    <Icon name="message-circle" size={48} className="text-green-500 mx-auto mb-6" /><h3 className="text-2xl font-black text-green-800 mb-6">Tham gia cộng đồng Zalo</h3>
                                    <a href={ZALO_LINK} target="_blank" className="inline-flex items-center gap-3 bg-green-500 text-white px-10 py-5 rounded-full font-black text-xl shadow-xl hover:bg-green-600 transition-all">Vào nhóm ngay <Icon name="external-link" size={20} /></a>
                                </div>
                            </div>
                        );
                    case 'admin':
                        return (
                            <div className="flex-1 flex flex-col animate-fade-in">
                                <div className="p-8 bg-white border-b flex justify-between items-center shadow-sm"><h2 className="text-2xl font-black text-green-700">Admin GreenPath</h2><button onClick={() => setView('home')} className="w-12 h-12 rounded-2xl bg-red-50 text-red-500 flex items-center justify-center"><Icon name="log-out" size={20} /></button></div>
                                <div className="p-8 flex-1 max-w-6xl mx-auto w-full space-y-6">
                                    <div className="relative"><Icon name="search" className="absolute left-6 top-1/2 -translate-y-1/2 text-green-300" size={20} /><input className="w-full pl-14 pr-6 py-5 bg-white border-2 border-green-50 rounded-3xl font-bold text-green-800 outline-none focus:border-green-500 transition-all" placeholder="Tìm kiếm học sinh..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} /></div>
                                    <div className="space-y-4 pb-20">
                                        {data.filter(r => r.name?.toLowerCase().includes(searchTerm.toLowerCase())).map(r => (
                                            <div key={r.id} className="p-6 bg-white rounded-[2rem] border border-green-50 flex items-center justify-between shadow-sm text-left">
                                                <div>
                                                    <h4 className="text-lg font-black text-green-800">{r.name}</h4>
                                                    <div className="flex flex-wrap gap-x-4 gap-y-1 text-[10px] font-bold text-gray-400 uppercase mt-1">
                                                        <span>{r.phone}</span>
                                                        <span>{r.school}</span>
                                                        <span className="text-green-600">{r.time}</span>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className="text-right">
                                                        <div className="text-[10px] font-black text-green-500">{Object.entries(r.scores || {}).sort((a, b) => b[1] - a[1])[0]?.[0]}</div>
                                                        <div className="text-xs font-bold text-gray-300">{r.timestamp?.toDate().toLocaleDateString('vi-VN')}</div>
                                                    </div>
                                                    <button onClick={async () => { if (confirm("Xóa bản ghi này?")) { await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'registrations', r.id)); } }} className="w-10 h-10 text-gray-300 hover:text-red-500"><Icon name="trash-2" size={18} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        );
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {view !== 'admin' && <Header />}
                    {renderContent()}
                    <AdminLoginModal />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
